<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        fieldset {
            width: 350px;
            border: 1px solid #dcdcdc;
            border-radius: 10px;
            padding: 20px;
            text-align: right; 
        }

        legend {
            background-color: #efefef;
            border: 1px solid #dcdcdc;
            border-radius: 10px;
            padding: 10px 20px;
            text-align: left;
            text-transform: uppercase;
        }


        .form-group {
            margin-bottom: 10px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        label {
            margin-right: 10px;
            font-weight: bold;
        }

        input {
            border: 1px solid #dcdcdc;
            padding: 5px;
            border-radius: 4px;
        }

        button {
            background-color: #302414;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <fieldset>
    <legend>Newsletter</legend>
    <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name">
    </div>
    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email">
    </div>
    <button type="submit">Subscribe</button>
</fieldset>
</body>
</html>
